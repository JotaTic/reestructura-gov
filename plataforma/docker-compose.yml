services:
  db:
    image: postgres:16-alpine
    container_name: reestructura_db
    environment:
      POSTGRES_DB: reestructura
      POSTGRES_USER: reestructura
      POSTGRES_PASSWORD: reestructura_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reestructura"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: reestructura_backend
    environment:
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DATABASE_URL: postgres://reestructura:reestructura_dev@db:5432/reestructura
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata apps/nomenclatura/fixtures/decreto_785_2005.json || true &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build: ./frontend
    container_name: reestructura_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
